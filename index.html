<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Rock · Paper · Scissors</title>
  
  <link rel="preload" href="images/white-rock-rps.PNG" as="image">
  <link rel="preload" href="images/white-paper-rps.PNG" as="image">
  <link rel="preload" href="images/white-scissors-rps.PNG" as="image">
  <link rel="preload" href="images/black-rock-rps.PNG" as="image">
  <link rel="preload" href="images/black-paper-rps.PNG" as="image">
  <link rel="preload" href="images/black-scissors-rps.PNG" as="image">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0eeeb; --text: #111; --muted: rgba(0,0,0,0.28); --border: rgba(0,0,0,0.08);
      --surface: rgba(255,255,255,0.7); --btn: #111; --btn-fg: #f0eeeb;
      --win: #1a7a42; --lose: #b52038; --tie: #666; 
      --glow-win: rgba(26,120,66,0.7); --glow-lose: rgba(181,32,56,0.65);
      --tr: 0.34s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme=dark] {
      --bg: #0c0c0c; --text: #f0eeeb; --muted: rgba(240,238,235,0.28); --border: rgba(240,238,235,0.08);
      --surface: rgba(24,24,24,0.88); --btn: #f0eeeb; --btn-fg: #0c0c0c;
      --win: #50c87c; --lose: #e0506a; --tie: #aaa;
      --glow-win: rgba(80,200,124,0.72); --glow-lose: rgba(224,80,106,0.68);
    }

    body {
      font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
      max-width: 430px; margin: 0 auto; overflow: hidden; position: relative;
      transition: background var(--tr), color var(--tr);
      padding-top: env(safe-area-inset-top, 0); padding-bottom: env(safe-area-inset-bottom, 0);
    }

    /* ══ HEADER (v11 Icons & Badge) ══ */
    .hdr { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 0; flex-shrink: 0; }
    .hdr-title { font-size: 0.56rem; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); font-weight: 400; }
    .hdr-right { display: flex; align-items: center; gap: 12px; }
    
    .online-badge { display: flex; align-items: center; gap: 5px; font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--win); }
    .ob-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--win); animation: obPulse 1.4s ease-in-out infinite; }
    .offline-badge { color: var(--lose); }
    .offline-badge .ob-dot { background: var(--lose); animation: none; box-shadow: 0 0 8px rgba(224, 80, 106, 0.5); }
    @keyframes obPulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.35; transform:scale(0.75); } }

    .speaker-btn { width: 30px; height: 30px; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); outline: none; transition: color 0.2s; }
    .speaker-btn:hover { color: var(--text); }
    .speaker-btn svg { width: 17px; height: 17px; }

    .toggle { width: 36px; height: 20px; background: var(--border); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; position: relative; transition: all var(--tr); }
    .toggle::after { content: ''; position: absolute; width: 13px; height: 13px; background: var(--text); border-radius: 50%; top: 50%; left: 3px; transform: translateY(-50%); transition: left var(--tr), background var(--tr); }
    [data-theme=dark] .toggle::after { left: calc(100% - 16px); }

    /* ══ SCORE ══ */
    .score-wrap { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-shrink: 0; }
    .score-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 6px 16px; display: flex; align-items: center; gap: 7px; backdrop-filter: blur(12px); }
    .sl { font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .sn { font-size: 1rem; font-weight: 600; min-width: 14px; text-align: center; }
    .sdot { color: var(--muted); font-size: 0.7rem; }

    /* ══ STAGE (v11 Floating Logic & SVGs) ══ */
    .stage-wrap { flex: 0 0 260px; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; margin-top: 10px; }
    .stage { width: 100%; height: 100%; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; position: relative; }
    .obj { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.34,1.4,0.64,1); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    
    .obj img { display: block; object-fit: contain; pointer-events: none; animation: float 4s ease-in-out infinite; }
    #o-rock img { height: clamp(140px,32vw,190px); max-width: 100px; animation-delay: 0s; }
    #o-paper img { height: clamp(110px,25vw,155px); max-width: 115px; animation-delay: 1.1s; }
    #o-scissors img { height: clamp(148px,34vw,198px); max-width: 72px; animation-delay: 2.2s; }
    
    /* Offline SVGs (Hidden by default) */
    .offline-icon { height: 75px; width: 75px; fill: var(--text); display: none; margin-bottom: 20px; animation: float 4s ease-in-out infinite; }
    #o-rock .offline-icon { animation-delay: 0s; }
    #o-paper .offline-icon { animation-delay: 1.1s; }
    #o-scissors .offline-icon { animation-delay: 2.2s; stroke: var(--text); stroke-width: 2; fill: none; }
    
    body.is-offline .obj img { display: none !important; }
    body.is-offline .obj .offline-icon { display: block !important; }

    .obj-lbl { font-size: 0.5rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes winLift { 0%, 100% { transform: translateY(0) scale(1); filter: brightness(1.1); } 50% { transform: translateY(-8px) scale(1.06); filter: brightness(1.22); } }
    
    .obj.dimmed { opacity: 0.1; transform: scale(0.85); pointer-events: none; }
    .obj.selected { transform: translateY(-12px) scale(1.04); cursor: default; }
    .obj.selected img, .obj.selected .offline-icon { filter: none !important; animation: selectedPulse 2s ease-in-out infinite; }
    .obj.winner img, .obj.winner .offline-icon { animation: winLift 1.8s ease-in-out infinite !important; }
    @keyframes selectedPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    /* ══ COUNTDOWN (v11 sequence) ══ */
    .countdown { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; gap: 6px; }
    .countdown.show { display: flex; }
    .cd-dots { display: flex; gap: 9px; }
    .cd-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text); opacity: 0.18; transition: 0.22s; }
    .cd-dot.active { opacity: 1; transform: scale(1.5); }

    /* ══ HISTORY ══ */
    .history { width: 100%; padding: 10px 20px; flex-shrink: 0; margin-top: auto; }
    .hlbl { font-size: 0.48rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .hlist { display: flex; flex-direction: column; gap: 4px; }
    .hitem { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 7px 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.64rem; color: var(--muted); animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* ══ BUTTONS ══ */
    .play-row { padding: 5px 20px 10px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
    .pbtn { background: var(--btn); color: var(--btn-fg); border: none; border-radius: 50px; padding: 14px 0; width: 100%; max-width: 260px; font-family: 'Outfit', sans-serif; font-size: 0.76rem; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
    .pbtn:disabled { opacity: 0.2; cursor: not-allowed; }
    .chal-btn { background: none; border: 1px solid var(--border); border-radius: 50px; padding: 10px 0; width: 100%; max-width: 260px; font-size: 0.63rem; color: var(--muted); cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px; }
    .chal-btn.accepted { color: var(--win); border-color: var(--win); pointer-events: none; }

    /* ══ RESULT OVERLAY ══ */
    .win-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.4s; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
    .win-overlay.show { opacity: 1; pointer-events: all; }
    .win-card { background: var(--surface); padding: 35px 40px; border-radius: 24px; text-align: center; width: 82vw; max-width: 300px; border: 1px solid var(--border); transform: scale(0.9); transition: 0.4s; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
    .win-overlay.show .win-card { transform: scale(1); }
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
  </style>
</head>
<body class="is-online">

<audio id="bgm" src="Chrono_Echoes_rockpaperscissors.mp3" loop preload="auto" style="display:none"></audio>
<audio id="pulse" src="pulse.mp3" preload="auto"></audio>
<audio id="tick" src="tick.mp3" preload="auto"></audio>
<audio id="win" src="win.mp3" preload="auto"></audio>
<audio id="lose" src="lose.mp3" preload="auto"></audio>

<canvas id="confetti"></canvas>

<div class="hdr">
  <span class="hdr-title">RPS</span>
  <div class="hdr-right">
    <div class="online-badge" id="net-status"><div class="ob-dot"></div><span id="net-txt">Online</span></div>
    <button class="speaker-btn" id="spk" onclick="toggleMute()" aria-label="Toggle music">
      <svg id="ico-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      <svg id="ico-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </button>
    <button class="toggle" onclick="toggleTheme()" aria-label="Theme"></button>
  </div>
</div>

<div class="score-wrap">
  <div class="score-pill"><span class="sl">You</span><span class="sn" id="s1">0</span></div>
  <span class="sdot">·</span>
  <div class="score-pill"><span class="sn" id="s2">0</span><span class="sl" id="p2lbl">CPU</span></div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="obj idle" id="o-rock" onclick="pick('rock')">
      <img id="i-rock" src="images/white-rock-rps.PNG" alt="Rock">
      <svg class="offline-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
      <div class="obj-lbl">Rock</div>
    </div>
    <div class="obj idle" id="o-paper" onclick="pick('paper')">
      <img id="i-paper" src="images/white-paper-rps.PNG" alt="Paper">
      <svg class="offline-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      <div class="obj-lbl">Paper</div>
    </div>
    <div class="obj idle" id="o-scissors" onclick="pick('scissors')">
      <img id="i-scissors" src="images/white-scissors-rps.PNG" alt="Scissors">
      <svg class="offline-icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      <div class="obj-lbl">Scissors</div>
    </div>

    <div class="countdown" id="countdown">
      <div class="cd-dots">
        <div class="cd-dot" id="cd0"></div>
        <div class="cd-dot" id="cd1"></div>
        <div class="cd-dot" id="cd2"></div>
      </div>
    </div>
  </div>
</div>

<div class="history">
  <div class="hlbl">Recent</div>
  <div class="hlist" id="hlist"></div>
</div>

<div class="play-row">
  <button class="pbtn" id="pbtn" onclick="startRound()" disabled>Play</button>
  <button class="chal-btn" id="chal-btn" onclick="initChallenge()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.4 1.12 2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16z"/>
    </svg>
    Challenge a Friend
  </button>
</div>

<div class="win-overlay" id="win-ov">
  <div class="win-card">
    <h2 id="win-title" style="text-transform:uppercase; font-size:1.15rem; font-weight: 600; letter-spacing: 1px;">Result</h2>
    <p id="win-sub" style="font-size: 0.75rem; color: var(--muted); margin-top: 5px; text-transform: capitalize;"></p>
    <button class="pbtn" style="margin-top:25px; max-width: 200px;" onclick="resetRound()">Continue</button>
  </div>
</div>

<script>
  let myScore=0, oppScore=0, myMove=null, oppMove=null, peer, conn, isMP=false, isMuted=false;
  const bgm = document.getElementById('bgm');
  bgm.volume = 0.22;

  // 1. Audio & Network 
  function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('ico-on').style.display = isMuted ? 'none' : 'block';
    document.getElementById('ico-off').style.display = isMuted ? 'block' : 'none';
    if(isMuted) bgm.pause(); else if(myMove) bgm.play().catch(()=>{});
  }

  function playSound(id) {
    if(!isMuted) {
      const audio = document.getElementById(id);
      audio.currentTime = 0;
      audio.play().catch(()=>{});
    }
  }

  function updateNet() {
    const on = navigator.onLine;
    const badge = document.getElementById('net-status');
    badge.className = on ? 'online-badge' : 'online-badge offline-badge';
    document.getElementById('net-txt').innerText = on ? 'Online' : 'Offline';
    document.body.className = on ? 'is-online' : 'is-offline';
  }

  function toggleTheme() {
    const root = document.documentElement;
    const isDark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    const color = isDark ? 'white' : 'black';
    ['rock','paper','scissors'].forEach(k => {
      const el = document.getElementById(`i-${k}`);
      if(el) el.src = `images/${color}-${k}-rps.PNG`;
    });
  }

  // 2. Multiplayer (Simplified Link logic)
  function setupPeer() {
    peer = new Peer();
    peer.on('open', id => {
      const g = new URLSearchParams(window.location.search).get('join');
      if(g) { conn = peer.connect(g); setupConnection(); }
    });
    peer.on('connection', c => { conn = c; setupConnection(); });
    peer.on('error', handleDisconnect);
  }

  function initChallenge() {
    const link = `${window.location.origin}${window.location.pathname}?join=${peer.id}`;
    const msg = `Play RPS with me: ${link}`;
    
    const btn = document.getElementById('chal-btn');
    btn.innerHTML = 'Waiting for friend...';
    btn.style.color = "var(--win)";
    btn.style.borderColor = "var(--win)";

    if (navigator.share) {
      navigator.share({ text: msg }).catch(() => { window.location.href = `sms:?body=${encodeURIComponent(msg)}`; });
    } else {
      window.location.href = `sms:?body=${encodeURIComponent(msg)}`;
    }
  }

  function setupConnection() {
    isMP = true;
    document.getElementById('p2lbl').innerText = "P2";
    const btn = document.getElementById('chal-btn');
    btn.innerText = "Challenge Accepted";
    btn.classList.add('accepted');
    btn.style.color = "var(--win)";
    btn.style.borderColor = "var(--win)";
    
    conn.on('data', data => {
      if(data.type === 'MOVE') { 
        oppMove = data.move; 
        if(myMove && document.getElementById('pbtn').innerText === "Waiting...") {
          doCountdown(); 
        }
      }
    });
    conn.on('close', handleDisconnect);
  }

  function handleDisconnect() {
    isMP = false; conn = null; oppMove = null;
    document.getElementById('p2lbl').innerText = "CPU";
    const btn = document.getElementById('chal-btn');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.4 1.12 2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16z"/></svg> Challenge a Friend`;
    btn.classList.remove('accepted');
    btn.style.color = ""; btn.style.borderColor = "";
    if(document.getElementById('pbtn').innerText === "Waiting...") {
      document.getElementById('pbtn').innerText = "Play";
      document.getElementById('pbtn').disabled = false;
    }
  }

  // 3. Game Flow (v11 Mechanics)
  function pick(m) {
    myMove = m;
    if(!isMuted && bgm.paused) bgm.play().catch(()=>{});
    playSound('pulse');
    document.querySelectorAll('.obj').forEach(o => o.classList.add('dimmed', 'no-anim'));
    document.getElementById(`o-${m}`).classList.remove('dimmed');
    document.getElementById(`o-${m}`).classList.add('selected');
    document.getElementById('pbtn').disabled = false;
  }

  function startRound() {
    document.getElementById('pbtn').disabled = true;
    if(isMP) {
      conn.send({type: 'MOVE', move: myMove});
      if(oppMove) { doCountdown(); } 
      else { document.getElementById('pbtn').innerText = "Waiting..."; }
    } else {
      oppMove = ['rock', 'paper', 'scissors'][Math.floor(Math.random()*3)];
      doCountdown();
    }
  }

  async function doCountdown() {
    document.getElementById('pbtn').innerText = "Playing...";
    const cd = document.getElementById('countdown');
    cd.classList.add('show');
    
    for(let i=0; i<3; i++) {
      document.getElementById(`cd${i}`).classList.add('active');
      playSound('tick');
      await new Promise(r => setTimeout(r, 600));
    }
    
    cd.classList.remove('show');
    document.querySelectorAll('.cd-dot').forEach(d => d.classList.remove('active'));
    resolveRound();
  }

  function resolveRound() {
    let res = 'tie';
    if((myMove==='rock'&&oppMove==='scissors')||(myMove==='paper'&&oppMove==='rock')||(myMove==='scissors'&&oppMove==='paper')) {
      res = 'win'; myScore++;
    } else if(myMove !== oppMove) {
      res = 'lose'; oppScore++;
    }

    updateHistory(res, myMove, oppMove);
    document.getElementById('s1').innerText = myScore;
    document.getElementById('s2').innerText = oppScore;
    
    const winTitle = document.getElementById('win-title');
    winTitle.innerText = res === 'win' ? 'YOU WON' : (res === 'lose' ? (isMP ? 'P2 WON' : 'CPU WON') : 'TIE');
    winTitle.style.color = `var(--${res})`;
    document.getElementById('win-sub').innerText = `${myMove} vs ${oppMove}`;
    
    if(res === 'win') {
      document.getElementById(`o-${myMove}`).classList.add('winner');
      playSound('win');
      launchConfetti();
    } else if (res === 'lose') {
      playSound('lose');
    }
    
    document.getElementById('win-ov').classList.add('show');
    if(isMP) oppMove = null;
  }

  function updateHistory(res, m1, m2) {
    const hlist = document.getElementById('hlist');
    const div = document.createElement('div');
    div.className = 'hitem';
    const label = res === 'win' ? 'You Won' : (res === 'lose' ? (isMP ? 'P2 Won' : 'CPU Won') : 'Tie');
    div.innerHTML = `
      <span style="text-transform:capitalize;">${m1} <span style="opacity:0.3; margin:0 4px;">•</span> ${m2}</span>
      <span style="color:var(--${res}); font-weight:600;">${label}</span>
    `;
    hlist.prepend(div);
    if (hlist.children.length > 5) hlist.removeChild(hlist.lastChild);
  }

  function resetRound() {
    myMove = null; 
    document.getElementById('win-ov').classList.remove('show');
    document.querySelectorAll('.obj').forEach(o => {
      o.classList.remove('dimmed', 'selected', 'winner', 'no-anim');
    });
    document.getElementById('pbtn').innerText = "Play";
    document.getElementById('pbtn').disabled = true;
  }

  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = Array.from({length: 45}, () => ({
      x: Math.random() * canvas.width, y: -20,
      size: Math.random() * 4 + 2, speed: Math.random() * 3 + 3,
      color: `hsla(${Math.random() * 360}, 60%, 50%, 0.8)`, drift: Math.random() * 2 - 1
    }));
    function frame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.y += p.speed; p.x += p.drift;
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      });
      if (particles.some(p => p.y < canvas.height)) requestAnimationFrame(frame);
    }
    frame();
  }

  window.onload = () => { setupPeer(); updateNet(); };
  window.addEventListener('online', updateNet);
  window.addEventListener('offline', updateNet);
</script>
</body>
</html>
